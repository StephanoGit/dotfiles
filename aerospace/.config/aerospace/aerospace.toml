after-startup-command = ['exec-and-forget ~/.config/borders/bordersrc']

# ── Float specific apps ───────────────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

# ── Gaps ──────────────────────────────────────────────────────────────────────
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# ── Key bindings ──────────────────────────────────────────────────────────────
[mode.main.binding]
# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Move to screen quarters (U=top-left, I=top-right, J=bottom-left, K=bottom-right)
# alt-u = 'move-mouse-cursor-force-click'  # placeholder — see note below
alt-u = ['move-node-to-monitor left',  'layout tiling']

# Snap to halves (H=left half, L=right half)
alt-shift-y = 'join-with left'
alt-shift-p = 'join-with right'

# Fullscreen & float
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Reload
alt-shift-r = 'reload-config'
